<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM DRL Express</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{--N:#1A0E45;--N2:#2a1a6b;--O:#F47920;--bg:#F4F3F8;--s:#fff;--s2:#F0EFF6;--bd:rgba(26,14,69,.10);--bm:rgba(26,14,69,.18);--tx:#1A0E45;--t2:#5A5370;--t3:#9590A8;--r:10px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}
.top{background:linear-gradient(135deg,#1A0E45 0%,#2d1060 55%,#8B1060 100%);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.top img{height:40px}
.top-right{display:flex;align-items:center;gap:10px}
.esel{font-family:'Barlow',sans-serif;font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;outline:none}
.esel option{color:#1A0E45;background:#fff}
.sync-badge{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.lay{display:flex;height:calc(100vh - 56px)}
.sb{width:210px;background:var(--s);border-right:1px solid var(--bd);padding:10px 0;flex-shrink:0;overflow-y:auto}
.mn{flex:1;overflow-y:auto;padding:20px}
.ns{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:12px 16px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-left:3px solid transparent;transition:background .12s;user-select:none}
.ni:hover{background:var(--s2);color:var(--tx)}
.ni.on{background:#EEEDFE;color:var(--N);border-left-color:var(--N)}
.ni i{font-size:17px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--s);border:1px solid var(--bd);border-top:3px solid var(--O);border-radius:var(--r);padding:14px 16px;box-shadow:0 1px 3px rgba(26,14,69,.08)}
.sl{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.sv{font-size:24px;font-weight:700;color:var(--N);font-family:'Barlow Condensed',sans-serif;line-height:1}
.ss{font-size:11px;color:var(--t3);margin-top:3px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.pt{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--N)}
.ps{font-size:12px;color:var(--t3);margin-top:1px}
.ac{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;border:1px solid var(--bm);background:var(--s);color:var(--tx);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .12s;white-space:nowrap}
.btn:hover{background:var(--s2)}
.bpr{background:var(--N);color:#fff;border-color:var(--N)}
.bpr:hover{background:var(--N2)}
.bxl{background:#1D6F42;color:#fff;border-color:#1D6F42;font-weight:600}
.bxl:hover{background:#155230}
.bsm{font-size:12px;padding:5px 10px}
.bdn{background:#fff0f0;color:#b91c1c;border-color:#fca5a5}
.pf{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--bm);background:var(--s);color:var(--t2);cursor:pointer;font-weight:500;transition:all .12s}
.pf.on{background:var(--N);color:#fff;border-color:var(--N)}
.fsl{font-family:'Barlow',sans-serif;font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--bm);background:var(--s);color:var(--tx);cursor:pointer}
.kb{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;align-items:start}
.kc{background:var(--s2);border-radius:var(--rl);padding:10px;min-height:280px}
.cb{height:3px;border-radius:2px;margin-bottom:8px}
.ct{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cn{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.3px}
.ck{font-size:10px;background:var(--s);border:1px solid var(--bd);border-radius:10px;padding:1px 7px;color:var(--t3)}
.cd{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:8px;cursor:pointer;transition:box-shadow .12s,border-color .12s}
.cd:hover{box-shadow:0 2px 12px rgba(26,14,69,.1);border-color:var(--bm)}
.dn{font-size:13px;font-weight:600;color:var(--N);margin-bottom:2px;line-height:1.3}
.ds{font-size:11px;color:var(--t3);margin-bottom:5px}
.dp{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.df{display:flex;align-items:center;justify-content:space-between}
.de{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:3px}
.dv{font-size:12px;font-weight:700;color:var(--N);font-family:'Barlow Condensed',sans-serif}
.dd{font-size:10px;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:3px}
.tdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.ab{width:100%;border:1.5px dashed var(--bm);background:transparent;border-radius:8px;padding:7px;font-family:'Barlow',sans-serif;font-size:12px;color:var(--t3);cursor:pointer;text-align:center}
.ab:hover{background:var(--s);color:var(--t2)}
.sp{font-size:9px;font-weight:600;padding:2px 6px;border-radius:5px}
.tw{background:var(--s);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:0 1px 3px rgba(26,14,69,.08)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--s2);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
tbody td{padding:10px 14px;border-top:1px solid var(--bd);vertical-align:middle}
tbody tr:hover{background:var(--s2)}
.ov{display:none;position:fixed;inset:0;background:rgba(26,14,69,.4);z-index:200;align-items:center;justify-content:center}
.ov.op{display:flex}
.mo{background:var(--s);border-radius:var(--rl);padding:22px;width:500px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(26,14,69,.2)}
.mh{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:var(--N);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.mx{background:none;border:none;font-size:20px;color:var(--t3);cursor:pointer;line-height:1;padding:0}
.mx:hover{color:var(--tx)}
.fi{margin-bottom:11px}
.fi label{display:block;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.fi input,.fi select,.fi textarea{width:100%;font-family:'Barlow',sans-serif;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--bm);background:var(--s2);color:var(--tx);outline:none}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--N);background:#fff}
.fi textarea{height:54px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:3px}
.si{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;border:1px solid var(--bm);cursor:pointer;user-select:none;font-size:12px;color:var(--t2);transition:all .12s}
.si.on{border-color:var(--N);background:#EEEDFE;color:var(--N);font-weight:500}
.si i{font-size:15px;pointer-events:none}
.si span{pointer-events:none}
.msec{margin-bottom:12px}
.mst{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;border-bottom:1px solid var(--bd);padding-bottom:4px}
.mr{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--bd)}
.mr:last-child{border-bottom:none}
.ml{color:var(--t3)}
.mv{font-weight:500;text-align:right;max-width:60%;font-size:12px}
.sbs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.sb2{font-family:'Barlow',sans-serif;font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--bm);background:var(--s2);color:var(--t2);cursor:pointer;font-weight:500}
.sb2:hover{background:var(--s)}
.sb2.on{background:var(--N);color:#fff;border-color:var(--N)}
.hi{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px}
.hi:last-child{border-bottom:none}
.hd{width:8px;height:8px;border-radius:50%;background:var(--N);margin-top:4px;flex-shrink:0}
.hr2{display:flex;gap:6px;margin-top:10px}
.hr2 input{flex:1;font-family:'Barlow',sans-serif;font-size:12px;padding:7px 10px;border-radius:8px;border:1px solid var(--bm);background:var(--s2);color:var(--tx);outline:none}
.hr2 input:focus{border-color:var(--N)}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.aa{background:var(--s);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;box-shadow:0 1px 3px rgba(26,14,69,.08)}
.at{font-size:13px;font-weight:600;color:var(--N);margin-bottom:11px}
.barrow{margin-bottom:9px}
.brl{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:3px}
.brt{background:var(--s2);border-radius:4px;height:7px;overflow:hidden}
.brf{height:100%;border-radius:4px;transition:width .4s}
.ec{background:var(--s2);border-radius:var(--r);padding:10px 12px}
.en{font-size:13px;font-weight:600;color:var(--N);margin-bottom:3px}
.es{font-size:11px;color:var(--t3)}
.eci{display:inline-block;margin-top:5px;background:#EAF3DE;color:#3B6D11;font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;border-top:1px solid var(--bd);padding-top:12px}
.tk{position:fixed;bottom:20px;right:20px;background:var(--N);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.tk.on{opacity:1;transform:none}
.tk.err{background:#b91c1c}
.em{text-align:center;padding:48px 20px;color:var(--t3)}
.em i{font-size:36px;margin-bottom:10px;display:block}
.loading{text-align:center;padding:60px 20px;color:var(--t3);font-size:13px}
.loading i{font-size:28px;margin-bottom:10px;display:block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.sb{display:none}.kb{grid-template-columns:1fr}.sg{grid-template-columns:1fr 1fr}.ag{grid-template-columns:1fr}.fr{grid-template-columns:1fr}}
</style>
</head>

// SUPABASE API
async function sbReq(method,path,body){
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
    method,
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json',
      'Prefer': method==='POST'?'return=representation':'return=representation',
    },
    body:body?JSON.stringify(body):undefined,
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}

async function loadLeads(){
  document.getElementById('mc').innerHTML='<div class="loading"><i class="ti ti-loader-2"></i>Cargando datos en tiempo real...</div>';
  try{
    const data=await sbReq('GET','leads?select=*&order=created_at.desc');
    leads=data||[];
    render();
  }catch(e){
    toast('Error cargando datos: '+e.message,true);
    document.getElementById('mc').innerHTML='<div class="em"><i class="ti ti-wifi-off"></i><p>Error de conexión. Verifica tu clave API.</p></div>';
  }
}

async function createLead(d){
  const row={
    name:d.name,sector:d.sector,ciudad:d.ciudad,exec:d.exec,
    stage:d.stage,temp:d.temp,valor:d.valor,contacto:d.contacto,
    tel:d.tel,email:d.email,fecha_cita:d.fecha_cita||null,
    nota:d.nota,svcs:d.svcs,
    hist:JSON.stringify([{t:today(),msg:'Prospecto creado'}]),
  };
  const res=await sbReq('POST','leads',row);
  return res&&res[0]?res[0]:row;
}

async function updateLead(id,d){
  await sbReq('PATCH','leads?id=eq.'+id,d);
}

async function deleteLead(id){
  await sbReq('DELETE','leads?id=eq.'+id);
}

// REALTIME via polling cada 15s
function startPolling(){
  setInterval(async()=>{
    try{
      const data=await sbReq('GET','leads?select=*&order=created_at.desc');
      const newLeads=data||[];
      if(JSON.stringify(newLeads.map(l=>l.updated_at))!==JSON.stringify(leads.map(l=>l.updated_at))){
        leads=newLeads;
        render();
        showSyncPulse();
      }
    }catch(e){}
  },15000);
}

function showSyncPulse(){
  const dot=document.getElementById('sync-dot');
  if(dot){dot.style.background='#F47920';setTimeout(()=>{dot.style.background='#4ade80';},1000);}
}

const fmt=n=>'$'+Math.round(n).toLocaleString('es-CO');
const today=()=>new Date().toISOString().slice(0,10);
const stLbl=id=>(ST.find(s=>s.id===id)||{label:id}).label;
const tpLbl=id=>(TP[id]||{l:id}).l;

function toast(m,err){
  const el=document.getElementById('tk');
  el.textContent=m;
  el.classList.remove('err');
  if(err)el.classList.add('err');
  el.classList.add('on');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('on'),3000);
}

function svcPill(id,big){
  const s=SV.find(x=>x.id===id);if(!s)return'';
  const pad=big?'3px 9px':'2px 6px';
  return '<span class="sp" style="background:'+s.bg+';color:'+s.tc+';padding:'+pad+'">'+(big?s.label:s.label.split(' ')[0])+'</span>';
}

function gl(){
  return leads.filter(l=>{
    if(fE&&l.exec!==fE)return false;
    if(fT!=='all'&&l.temp!==fT)return false;
    if(fS&&!(l.svcs||[]).includes(fS))return false;
    return true;
  });
}

function render(){
  const mc=document.getElementById('mc');
  if(view==='embudo')mc.innerHTML=rEmbudo();
  else if(view==='citas')mc.innerHTML=rCitas();
  else if(view==='analisis')mc.innerHTML=rAnalisis();
  else if(view==='clientes')mc.innerHTML=rClientes();
  attachEvents();
}

function attachEvents(){
  document.getElementById('mc').addEventListener('click',function(e){
    const lead=e.target.closest('[data-lead]');
    if(lead){openDetail(parseInt(lead.dataset.lead));return;}
    const add=e.target.closest('[data-add]');
    if(add){openNew(add.dataset.add);return;}
    const xl=e.target.closest('[data-xl]');
    if(xl){exportExcel(xl.dataset.xl);return;}
    const nb=e.target.closest('#btn-nuevo');
    if(nb){openNew('prospecto');return;}
    const nc=e.target.closest('#btn-nueva-cita');
    if(nc){openNew('cita');return;}
    const pf=e.target.closest('[data-temp]');
    if(pf){fT=pf.dataset.temp;render();return;}
  },false);
  document.getElementById('mc').addEventListener('change',function(e){
    if(e.target.id==='svc-filter'){fS=e.target.value;render();}
  });
}

// ANALISIS
function rAnalisis(){
  const all=gl();
  const bySt={};ST.forEach(s=>{bySt[s.id]=all.filter(l=>l.stage===s.id).length;});
  const mxSt=Math.max(...Object.values(bySt),1);
  const bySv={};SV.forEach(s=>{bySv[s.id]=all.filter(l=>{const sv=Array.isArray(l.svcs)?l.svcs:(typeof l.svcs==='string'?JSON.parse(l.svcs||'[]'):[]);return sv.includes(s.id);}).length;});
  const mxSv=Math.max(...Object.values(bySv),1);
  const byEx={};
  all.forEach(l=>{if(!byEx[l.exec])byEx[l.exec]={n:0,val:0,ci:0};byEx[l.exec].n++;byEx[l.exec].val+=(l.valor||0);if(l.stage==='cierre')byEx[l.exec].ci++;});
  const tv=all.reduce((a,b)=>a+(b.valor||0),0);
  const conv=all.length?Math.round(all.filter(l=>l.stage==='cierre').length/all.length*100):0;
  let h='<div class="ph"><div><div class="pt">Análisis del pipeline</div><div class="ps">Rendimiento comercial en tiempo real</div></div>';
  h+='<button class="btn bxl" data-xl="all"><i class="ti ti-file-spreadsheet"></i>Exportar todo a Excel</button></div>';
  h+='<div class="sg" style="margin-bottom:14px">';
  h+='<div class="sc"><div class="sl">Total</div><div class="sv">'+all.length+'</div></div>';
  h+='<div class="sc"><div class="sl">Valor total</div><div class="sv" style="font-size:15px">'+fmt(tv)+'</div></div>';
  h+='<div class="sc"><div class="sl">Tasa cierre</div><div class="sv">'+conv+'%</div></div>';
  h+='<div class="sc"><div class="sl">Ticket promedio</div><div class="sv" style="font-size:15px">'+(all.length?fmt(Math.round(tv/all.length)):fmt(0))+'</div></div>';
  h+='</div><div class="ag">';
  h+='<div class="aa"><div class="at">Por etapa</div>';
  ST.forEach(s=>{
    h+='<div class="barrow"><div class="brl"><span>'+s.label+'</span><span style="font-weight:600">'+(bySt[s.id]||0)+'</span></div>';
    h+='<div class="brt"><div class="brf" style="background:'+s.ind+';width:'+Math.round(((bySt[s.id]||0)/mxSt)*100)+'%"></div></div></div>';
  });
  h+='</div><div class="aa"><div class="at">Demanda por servicio</div>';
  SV.forEach(s=>{
    h+='<div class="barrow"><div class="brl"><span>'+s.label+'</span><span style="font-weight:600">'+(bySv[s.id]||0)+'</span></div>';
    h+='<div class="brt"><div class="brf" style="background:'+s.tc+';width:'+Math.round(((bySv[s.id]||0)/mxSv)*100)+'%"></div></div></div>';
  });
  h+='</div></div>';
  h+='<div class="aa"><div class="at">Por ejecutivo</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px">';
  Object.entries(byEx).forEach(([ex,d])=>{
    h+='<div class="ec"><div class="en">'+ex+'</div><div class="es">'+d.n+' prospecto'+(d.n!==1?'s':'')+'</div><div class="es">'+fmt(d.val)+'</div><span class="eci">'+d.ci+' cierre'+(d.ci!==1?'s':'')+'</span></div>';
  });
  h+='</div></div>';
  return h;
}

    h+='<td style="font-size:12px;color:var(--t2)">'+(c.tel||'')+'</td>';

    h+='<td><button class="btn bsm" data-lead="'+c.id+'">Ver</button></td></tr>';

// EXCEL
function exportExcel(tipo){
  if(typeof XLSX==='undefined'){alert('Librería Excel cargando, espera 3s.');return;}
  const hoy=today();
  const svcsStr=l=>{const sv=Array.isArray(l.svcs)?l.svcs:(typeof l.svcs==='string'?JSON.parse(l.svcs||'[]'):[]);return sv.map(id=>{const s=SV.find(x=>x.id===id);return s?s.label:id;}).join(', ');};
  const histStr=l=>{try{const h=typeof l.hist==='string'?JSON.parse(l.hist||'[]'):l.hist||[];return h.map(x=>x.t+': '+x.msg).join(' | ');}catch{return '';}};
  const toRow=l=>({'Empresa':l.name,'Sector':l.sector,'Ciudad':l.ciudad,'Ejecutivo':l.exec,'Etapa':stLbl(l.stage),'Temperatura':tpLbl(l.temp),'Contacto':l.contacto,'Telefono':l.tel,'Email':l.email,'Fecha Cita':l.fecha_cita||'','Servicios':svcsStr(l),'Valor COP':l.valor||0,'Notas':l.nota||'','Historial':histStr(l)});
  const wb=XLSX.utils.book_new();
  let fname;
  if(tipo==='citas'){
    const rows=gl().filter(l=>l.fecha_cita).sort((a,b)=>a.fecha_cita.localeCompare(b.fecha_cita)).map(toRow);
    fname='DRL_Citas_'+hoy+'.xlsx';
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.length?rows:[{}]),'Citas');
  }else if(tipo==='clientes'){
    const rows=leads.filter(l=>l.stage==='cierre').map(toRow);
    fname='DRL_Clientes_'+hoy+'.xlsx';
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.length?rows:[{}]),'Clientes Ganados');
  }else{
    fname='DRL_Pipeline_'+hoy+'.xlsx';
    const all=gl().map(toRow);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(all.length?all:[{}]),'Pipeline Completo');
    ST.forEach(s=>{const r=gl().filter(l=>l.stage===s.id).map(toRow);if(r.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(r),s.label.substring(0,31));});
    const cit=gl().filter(l=>l.fecha_cita).map(toRow);
    if(cit.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cit),'Citas');
    const byExArr={};gl().forEach(l=>{if(!byExArr[l.exec])byExArr[l.exec]={Ejecutivo:l.exec,Prospectos:0,Valor_COP:0,Cierres:0};byExArr[l.exec].Prospectos++;byExArr[l.exec].Valor_COP+=(l.valor||0);if(l.stage==='cierre')byExArr[l.exec].Cierres++;});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(Object.values(byExArr)),'Resumen Ejecutivos');
  }
  XLSX.writeFile(wb,fname);
  toast('Exportado: '+fname);
}

  h+='<div class="msec"><div class="mst">Historial de actividad</div>';
  hist.forEach(hh=>{h+='<div class="hi"><div class="hd"></div><div><div style="color:var(--t2);font-size:12px">'+hh.msg+'</div><div style="color:var(--t3);font-size:10px">'+hh.t+'</div></div></div>';});
  h+='<div class="hr2"><input id="hn-inp" type="text" placeholder="Registrar actividad…"><button class="btn bpr bsm" id="d-addhist">Guardar</button></div>';
  h+='</div>';
  h+='<div class="mf"><button class="btn bdn bsm" id="d-del"><i class="ti ti-trash"></i> Eliminar</button>';
  h+='<button class="btn bsm" id="d-edit"><i class="ti ti-edit"></i> Editar</button>';
  h+='<button class="btn bsm" id="d-close2">Cerrar</button></div>';
  document.getElementById('mb').innerHTML=h;
  openModal();

  document.getElementById('d-close').onclick=closeModal;
  document.getElementById('d-close2').onclick=closeModal;
  document.getElementById('d-del').onclick=async()=>{
    if(!confirm('¿Eliminar este prospecto?'))return;
    try{await deleteLead(id);toast('Eliminado');closeModal();await loadLeads();}
    catch(e){toast('Error: '+e.message,true);}
  };
  document.getElementById('d-edit').onclick=()=>openEdit(id);
  document.getElementById('d-addhist').onclick=async()=>{
    const inp=document.getElementById('hn-inp');
    const msg=inp.value.trim();if(!msg)return;
    const newHist=[...hist,{t:today(),msg}];
    try{
      await updateLead(id,{hist:JSON.stringify(newHist),updated_at:new Date().toISOString()});
      toast('Actividad guardada ✓');
      await loadLeads();
      openDetail(id);
    }catch(e){toast('Error: '+e.message,true);}
  };
  document.getElementById('hn-inp').onkeydown=e=>{if(e.key==='Enter')document.getElementById('d-addhist').click();};
  document.querySelectorAll('[data-stage-id]').forEach(el=>{
    el.onclick=async()=>{
      try{
        const newHist=[...hist,{t:today(),msg:'Avanzó a: '+stLbl(el.dataset.stageId)}];
        await updateLead(id,{stage:el.dataset.stageId,hist:JSON.stringify(newHist),updated_at:new Date().toISOString()});
        toast('Etapa actualizada ✓');
        await loadLeads();
        openDetail(id);
      }catch(e){toast('Error: '+e.message,true);}
    };
  });
}

// FORM
function openNew(st){showForm(null,st||'prospecto');}
function openEdit(id){showForm(leads.find(x=>x.id===id));}

function showForm(l,ds){
  ds=ds||'prospecto';
  const isnew=!l;
  const svcs=l?(Array.isArray(l.svcs)?l.svcs:(typeof l.svcs==='string'?JSON.parse(l.svcs||'[]'):[])):[]; 
  let h='<div class="mh">'+(isnew?'Nuevo prospecto':'Editar prospecto')+'<button class="mx" id="f-close"><i class="ti ti-x"></i></button></div>';
  h+='<div class="fr"><div class="fi"><label>Empresa *</label><input id="fn" type="text" value="'+(l?l.name:'')+'" placeholder="Razón social"></div>';
  h+='<div class="fi"><label>Sector</label><input id="fse" type="text" value="'+(l?l.sector||'':'')+'" placeholder="Retail, Pharma…"></div></div>';
  h+='<div class="fr"><div class="fi"><label>Ciudad</label><input id="fci" type="text" value="'+(l?l.ciudad||'':'')+'" placeholder="Barranquilla"></div>';
  h+='<div class="fi"><label>Contacto</label><input id="fco" type="text" value="'+(l?l.contacto||'':'')+'" placeholder="Gerente de Logística"></div></div>';
  h+='<div class="fr"><div class="fi"><label>Teléfono</label><input id="ft" type="text" value="'+(l?l.tel||'':'')+'" placeholder="300 000 0000"></div>';
  h+='<div class="fi"><label>Email</label><input id="fe" type="text" value="'+(l?l.email||'':'')+'" placeholder="correo@empresa.co"></div></div>';
  h+='<div class="fr"><div class="fi"><label>Ejecutivo</label><select id="fex">';
  EX.forEach(ex=>{h+='<option'+(l&&l.exec===ex?' selected':'')+'>'+ex+'</option>';});
  h+='</select></div><div class="fi"><label>Etapa</label><select id="fst">';
  ST.forEach(s=>{h+='<option value="'+s.id+'"'+((l?l.stage:ds)===s.id?' selected':'')+'>'+s.label+'</option>';});
  h+='</select></div></div>';
  h+='<div class="fr"><div class="fi"><label>Temperatura</label><select id="ftp">';
  [['new','Nuevo'],['hot','Caliente'],['warm','Tibio'],['cold','Frío']].forEach(([v,lb])=>{
    h+='<option value="'+v+'"'+(l&&l.temp===v?' selected':'')+'>'+lb+'</option>';
  });
  h+='</select></div><div class="fi"><label>Valor potencial COP/mes</label><input id="fv" type="number" value="'+(l?l.valor||'':'')+'" placeholder="5000000"></div></div>';
  h+='<div class="fi"><label>Fecha de cita</label><input id="fca" type="date" value="'+(l&&l.fecha_cita?l.fecha_cita:'')+'"></div>';
  h+='<div class="fi"><label>Líneas de servicio</label><div class="sg2">';
  SV.forEach(s=>{
    h+='<div class="si'+(svcs.includes(s.id)?' on':'')+'" data-sv="'+s.id+'"><i class="ti '+s.icon+'"></i><span>'+s.label+'</span></div>';
  });
  h+='</div></div>';
  h+='<div class="fi"><label>Notas</label><textarea id="fno">'+(l?l.nota||'':'')+'</textarea></div>';
  h+='<div class="mf"><button class="btn bsm" id="f-cancel">Cancelar</button>';
  h+='<button class="btn bpr bsm" id="f-save">'+(isnew?'Guardar prospecto':'Guardar cambios')+'</button></div>';
  document.getElementById('mb').innerHTML=h;
  openModal();

  document.querySelectorAll('[data-sv]').forEach(el=>{el.onclick=()=>el.classList.toggle('on');});
  document.getElementById('f-close').onclick=closeModal;
  document.getElementById('f-cancel').onclick=()=>{if(l)openDetail(l.id);else closeModal();};
  document.getElementById('f-save').onclick=async()=>{
    const name=document.getElementById('fn').value.trim();
    if(!name){alert('Ingresa el nombre de la empresa');return;}
    const svcsSel=Array.from(document.querySelectorAll('[data-sv].on')).map(e=>e.dataset.sv);
    const d={
      name,sector:document.getElementById('fse').value||'',
      ciudad:document.getElementById('fci').value||'',
      contacto:document.getElementById('fco').value||'',
      tel:document.getElementById('ft').value||'',
      email:document.getElementById('fe').value||'',
      exec:document.getElementById('fex').value,
      stage:document.getElementById('fst').value,
      temp:document.getElementById('ftp').value,
      valor:parseInt(document.getElementById('fv').value)||0,
      fecha_cita:document.getElementById('fca').value||null,
      nota:document.getElementById('fno').value||'',
      svcs:svcsSel,
      updated_at:new Date().toISOString(),
    };
    try{
      if(isnew){
        await createLead(d);
        toast('Prospecto guardado ✓');
      }else{
        await updateLead(l.id,d);
        toast('Cambios guardados ✓');
      }
      closeModal();
      await loadLeads();
    }catch(e){toast('Error: '+e.message,true);}
  };
}

function openModal(){document.getElementById('ov').classList.add('op');}
function closeModal(){document.getElementById('ov').classList.remove('op');}

// INIT
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('esel').onchange=e=>{fE=e.target.value;render();};
  document.getElementById('ov').onclick=e=>{if(e.target===document.getElementById('ov'))closeModal();};
  document.querySelectorAll('[data-view]').forEach(el=>{
    el.onclick=()=>{
      view=el.dataset.view;
      document.querySelectorAll('[data-view]').forEach(n=>n.classList.remove('on'));
      el.classList.add('on');
      render();
    };
  });
  document.getElementById('btn-exp-all').onclick=()=>exportExcel('all');
  document.getElementById('btn-exp-citas').onclick=()=>exportExcel('citas');
  document.getElementById('btn-exp-cli').onclick=()=>exportExcel('clientes');
  document.getElementById('btn-refresh').onclick=async()=>{await loadLeads();toast('Actualizado ✓');};
  loadLeads();
  startPolling();
});
</script>
</body>
</html>
